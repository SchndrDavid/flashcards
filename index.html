<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    button {
      font-family: inherit;
    }

    kbd {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #d1d5db;
      margin: 0 2px;
    }

    code {
      background: #1f2937;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: #fbbf24;
    }

    pre code {
      background: transparent;
      padding: 0;
      color: #e5e7eb;
    }

    input,
    textarea {
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      border-color: #3b82f6 !important;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #9ca3af;
    }

    /* Responsive nav – horizontal scroll when tabs don't fit */
    .app-nav {
      min-width: 0;
    }
    @media (max-width: 960px) {
      .app-nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex: 1;
      }
      .app-nav::-webkit-scrollbar { display: none; }
      .app-nav button { white-space: nowrap; flex-shrink: 0; }
    }

    /* Stack 2-column grids on narrow screens */
    @media (max-width: 560px) {
      .resp-grid-2 { grid-template-columns: 1fr !important; }
      .resp-grid-3 { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading">Načítání...</div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const STORAGE_KEY = 'flashcard_sets_v2';
    const SETTINGS_KEY = 'flashcard_settings_v1';
    const DAILY_KEY = 'flashcard_daily_v1';

    // --- Jednoduché ikony jako SVG inline (místo lucide-react) ---
    const Icon = ({ children, size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
        {children}
      </svg>
    );
    const IconUpload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></Icon>;
    const IconDownload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></Icon>;
    const IconFile = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /></Icon>;
    const IconTrash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /></Icon>;
    const IconPlay = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3" /></Icon>;
    const IconReset = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></Icon>;
    const IconChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
    const IconChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
    const IconCheck = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12" /></Icon>;
    const IconAlert = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></Icon>;
    const IconX = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;

    // --- Parser ---
    const parseText = (text) => {
      const lines = text.split('\n');
      const cards = [];
      const errors = [];
      lines.forEach((rawLine, idx) => {
        const line = rawLine.trim();
        if (!line || line.startsWith('#')) return;
        const separators = [' :: ', ' | ', ' - '];
        let sep = null;
        let sepIdx = -1;
        for (const s of separators) {
          const i = line.indexOf(s);
          if (i !== -1) { sep = s; sepIdx = i; break; }
        }
        if (sepIdx === -1) {
          errors.push(`Řádek ${idx + 1}: chybí oddělovač (-, |, ::)`);
          return;
        }
        const front = line.substring(0, sepIdx).trim();
        const back = line.substring(sepIdx + sep.length).trim();
        if (!front || !back) {
          errors.push(`Řádek ${idx + 1}: prázdná strana karty`);
          return;
        }
        cards.push({ front, back });
      });
      return { cards, errors };
    };

    function countStats(cards) {
      const stats = { correct: 0, partial: 0, wrong: 0, unanswered: 0 };
      cards.forEach((c) => {
        if (c.status === 'correct') stats.correct++;
        else if (c.status === 'partial') stats.partial++;
        else if (c.status === 'wrong') stats.wrong++;
        else stats.unanswered++;
      });
      return stats;
    }

    // --- Export/Import utilities ---
    function exportToCSV(sets, settings, dailyData) {
      const esc = (val) => {
        const str = String(val ?? '');
        if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r'))
          return '"' + str.replace(/"/g, '""') + '"';
        return str;
      };
      const row = (...cells) => cells.map(esc).join(',');
      const lines = [row('type','col1','col2','col3','col4','col5','col6','col7')];

      sets.forEach(set => {
        lines.push(row('SET', set.id, set.name, set.createdAt));
        set.cards.forEach(card => {
          lines.push(row('CARD', set.id, card.front, card.back, card.status || 'unanswered'));
        });
      });

      (settings.dailyTestConfigs || []).forEach(config => {
        lines.push(row('DAILY_CONFIG', config.setId, config.count, config.mode));
      });

      if (dailyData && dailyData.date) {
        lines.push(row('DAILY_DATE', dailyData.date));
        (dailyData.sets || []).forEach(ds => {
          lines.push(row('DAILY_SET', ds.id, ds.sourceSetId, ds.name, ds.mode));
          ds.cards.forEach(card => {
            lines.push(row('DAILY_CARD', ds.id, card.front, card.back,
              card.status || 'unanswered', card.dailyStatus || 'unanswered',
              card.dailyOldStatus || 'unanswered', card.originalIdx ?? ''));
          });
        });
      }
      return lines.join('\n');
    }

    function parseCSVFull(text) {
      const rows = [];
      let row = [], cell = '', inQuotes = false;
      for (let i = 0; i <= text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (text[i + 1] === '"') { cell += '"'; i++; }
            else inQuotes = false;
          } else if (ch !== undefined) { cell += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { row.push(cell); cell = ''; }
          else if (ch === '\r') { /* skip CR */ }
          else if (ch === '\n' || ch === undefined) {
            row.push(cell); cell = '';
            rows.push(row); row = [];
          } else { cell += ch; }
        }
      }
      return rows.filter(r => r.some(c => c !== ''));
    }

    function importFromCSV(text) {
      const rows = parseCSVFull(text);
      if (rows.length < 2) throw new Error('Soubor je prázdný nebo neplatný.');
      if (rows[0][0] !== 'type') throw new Error('Neplatný formát souboru (chybí hlavička).');

      const sets = [], dailyTestConfigs = [], dailySets = [];
      let dailyDate = null, currentSet = null, currentDailySet = null;

      for (let i = 1; i < rows.length; i++) {
        const [type, c1, c2, c3, c4, c5, c6, c7] = rows[i];
        if (type === 'SET') {
          currentSet = { id: c1, name: c2, createdAt: c3, cards: [] };
          sets.push(currentSet);
        } else if (type === 'CARD') {
          if (currentSet && currentSet.id === c1)
            currentSet.cards.push({ front: c2, back: c3, status: c4 || 'unanswered', id: `${currentSet.id}_${currentSet.cards.length}` });
        } else if (type === 'DAILY_CONFIG') {
          dailyTestConfigs.push({ setId: c1, count: parseInt(c2, 10), mode: c3 });
        } else if (type === 'DAILY_DATE') {
          dailyDate = c1;
        } else if (type === 'DAILY_SET') {
          currentDailySet = { id: c1, sourceSetId: c2, name: c3, mode: c4, cards: [] };
          dailySets.push(currentDailySet);
        } else if (type === 'DAILY_CARD') {
          if (currentDailySet && currentDailySet.id === c1)
            currentDailySet.cards.push({
              front: c2, back: c3, status: c4 || 'unanswered',
              dailyStatus: c5 || 'unanswered', dailyOldStatus: c6 || 'unanswered',
              originalIdx: c7 !== '' && c7 !== undefined ? parseInt(c7, 10) : undefined
            });
        }
      }
      return { sets, settings: { dailyTestConfigs }, dailyData: { date: dailyDate, sets: dailySets } };
    }

    // --- App ---
    function FlashcardsApp() {
      const [tab, setTab] = useState('home');
      const [sets, setSets] = useState([]);
      const [studyId, setStudyId] = useState(null);
      const [studyDailyId, setStudyDailyId] = useState(null);
      const [settings, setSettings] = useState({ dailyTestConfigs: [] });
      const [dailyData, setDailyData] = useState({ date: null, sets: [] });

      useEffect(() => {
        try {
          const rawSets = localStorage.getItem(STORAGE_KEY);
          if (rawSets) setSets(JSON.parse(rawSets));
          const rawSettings = localStorage.getItem(SETTINGS_KEY);
          if (rawSettings) setSettings(JSON.parse(rawSettings));
          const rawDaily = localStorage.getItem(DAILY_KEY);
          if (rawDaily) setDailyData(JSON.parse(rawDaily));
        } catch (e) { console.error(e); }
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
          localStorage.setItem(DAILY_KEY, JSON.stringify(dailyData));
        }
        catch (e) { console.error(e); }
      }, [sets, settings, dailyData]);

      // Generování denních sad
      useEffect(() => {
        if (sets.length === 0) return;
        const today = new Date().toISOString().split('T')[0];

        let needsUpdate = false;
        let newDailySets = [];

        if (dailyData.date !== today) {
          needsUpdate = true;
        } else {
          newDailySets = [...dailyData.sets];
          const existingDailySetIds = newDailySets.map(ds => ds.sourceSetId);
          const hasNewConfigs = settings.dailyTestConfigs.some(config => !existingDailySetIds.includes(config.setId));
          if (hasNewConfigs) {
            needsUpdate = true;
          }
        }

        if (needsUpdate) {
          settings.dailyTestConfigs.forEach(config => {
            if (dailyData.date === today && newDailySets.some(ds => ds.sourceSetId === config.setId)) {
              return; // Tuto sadu už jsme dnes vygenerovali
            }

            const mainSet = sets.find(s => s.id === config.setId);
            if (!mainSet) return;

            let candidateCards = [];
            if (config.mode === 'all') {
              candidateCards = mainSet.cards.map((c, i) => ({ ...c, originalIdx: i }));
            } else if (config.mode === 'partial_wrong') {
              candidateCards = mainSet.cards
                .map((c, i) => ({ ...c, originalIdx: i }))
                .filter(c => c.status === 'partial' || c.status === 'wrong');
            } else if (config.mode === 'only_wrong') {
              candidateCards = mainSet.cards
                .map((c, i) => ({ ...c, originalIdx: i }))
                .filter(c => c.status === 'wrong');
            }

            candidateCards = candidateCards.sort(() => Math.random() - 0.5);
            const selected = candidateCards.slice(0, config.count).map(c => ({
              ...c,
              dailyStatus: 'unanswered',
              dailyOldStatus: c.status,
              status: 'unanswered'
            }));

            if (selected.length > 0) {
              newDailySets.push({
                id: 'daily_' + config.setId + '_' + Date.now().toString(36),
                sourceSetId: config.setId,
                name: mainSet.name,
                mode: config.mode,
                cards: selected
              });
            }
          });
          setDailyData({ date: today, sets: newDailySets });
        }
      }, [sets, settings.dailyTestConfigs, dailyData.date, dailyData.sets]);

      const addSet = (name, cards) => {
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const newSet = {
          id, name,
          cards: cards.map((c, i) => ({ ...c, id: `${id}_${i}`, status: 'unanswered' })),
          createdAt: new Date().toISOString(),
        };
        setSets((prev) => [newSet, ...prev]);
        return id;
      };

      const deleteSet = (id) => {
        setSets((prev) => prev.filter((s) => s.id !== id));
        if (studyId === id) setStudyId(null);
      };

      const updateCardStatus = (setId, cardIdx, status) => {
        setSets((prev) => prev.map((s) => {
          if (s.id !== setId) return s;
          const cards = s.cards.map((c, i) => i === cardIdx ? { ...c, status } : c);
          return { ...s, cards };
        }));
      };

      const updateDailyCardStatus = (dailySetId, dailyCardIdx, status) => {
        let sourceSetId = null;
        let originalIdx = null;

        setDailyData((prev) => {
          const newSets = prev.sets.map((ds) => {
            if (ds.id !== dailySetId) return ds;
            const newCards = ds.cards.map((c, i) => {
              if (i === dailyCardIdx) {
                sourceSetId = ds.sourceSetId;
                originalIdx = c.originalIdx;
                return { ...c, dailyStatus: status, status: status }; // Update both for consistency in daily view
              }
              return c;
            });
            return { ...ds, cards: newCards };
          });
          return { ...prev, sets: newSets };
        });

        if (sourceSetId !== null && originalIdx !== null) {
          updateCardStatus(sourceSetId, originalIdx, status);
        }
      };

      const importAll = (newSets, newSettings, newDailyData) => {
        setSets(newSets);
        setSettings(newSettings);
        setDailyData(newDailyData);
      };

      const resetSet = (id) => {
        setSets((prev) => prev.map((s) => {
          if (s.id !== id) return s;
          return { ...s, cards: s.cards.map((c) => ({ ...c, status: 'unanswered' })) };
        }));
      };

      const studyingSet = studyId ? sets.find((s) => s.id === studyId) : null;
      const studyingDailySet = studyDailyId ? dailyData.sets.find((s) => s.id === studyDailyId) : null;

      if (studyingSet) {
        return (
          <StudyView
            set={studyingSet}
            isDaily={false}
            onExit={() => setStudyId(null)}
            onStatusChange={(idx, status) => updateCardStatus(studyingSet.id, idx, status)}
            onReset={() => resetSet(studyingSet.id)}
          />
        );
      }

      if (studyingDailySet) {
        return (
          <StudyView
            set={studyingDailySet}
            isDaily={true}
            onExit={() => setStudyDailyId(null)}
            onStatusChange={(idx, status) => updateDailyCardStatus(studyingDailySet.id, idx, status)}
            onReset={() => { }}
          />
        );
      }

      return (
        <div style={s.app}>
          <Header tab={tab} onTabChange={setTab} />
          <main style={s.main}>
            {tab === 'home' && <HomeTab onCreate={addSet} onGoToSets={() => setTab('mysets')} hasSets={sets.length > 0} />}
            {tab === 'mysets' && <MySetsTab sets={sets} onStudy={setStudyId} onDelete={deleteSet} onReset={resetSet} onCreate={() => setTab('home')} />}
            {tab === 'daily' && <DailyTestTab dailyData={dailyData} onStudyDaily={setStudyDailyId} onGoToSettings={() => setTab('settings')} />}
            {tab === 'settings' && <SettingsTab sets={sets} settings={settings} setSettings={setSettings} />}
            {tab === 'guide' && <GuideTab />}
            {tab === 'export' && <ExportImportTab sets={sets} settings={settings} dailyData={dailyData} onImportAll={importAll} />}
          </main>
        </div>
      );
    }

    function Header({ tab, onTabChange }) {
      const tabs = [
        { id: 'home', label: 'Domů' },
        { id: 'mysets', label: 'Moje sady' },
        { id: 'daily', label: 'Denní testování' },
        { id: 'settings', label: 'Nastavení' },
        { id: 'guide', label: 'Návod' },
        { id: 'export', label: 'Export/Import' },
      ];
      return (
        <header style={s.header}>
          <div style={s.headerInner}>
            {/* Zde bylo odstraněno " V1" */}
            <div style={s.logo}>Flashcards</div>
            <nav style={s.nav} className="app-nav">
              {tabs.map((t) => (
                <button key={t.id} onClick={() => onTabChange(t.id)}
                  style={{ ...s.navBtn, color: tab === t.id ? '#fff' : '#9ca3af', fontWeight: tab === t.id ? 600 : 400 }}>
                  {t.label}
                </button>
              ))}
            </nav>
          </div>
        </header>
      );
    }

    function HomeTab({ onCreate, onGoToSets, hasSets }) {
      const [name, setName] = useState('');
      const [text, setText] = useState('');
      const [parsed, setParsed] = useState(null);
      const [errors, setErrors] = useState([]);
      const fileRef = useRef(null);

      const updateParse = (newText) => {
        setText(newText);
        if (!newText.trim()) { setParsed(null); setErrors([]); return; }
        const { cards, errors } = parseText(newText);
        setParsed(cards);
        setErrors(errors);
      };

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!name.trim()) setName(file.name.replace(/\.[^.]+$/, ''));
        const reader = new FileReader();
        reader.onload = (ev) => updateParse(String(ev.target?.result || ''));
        reader.readAsText(file, 'UTF-8');
      };

      const handleCreate = () => {
        if (!parsed || parsed.length === 0) return;
        const setName = name.trim() || `Sada ${new Date().toLocaleDateString('cs-CZ')}`;
        onCreate(setName, parsed);

        // Přidán vyskakovací popup s potvrzením
        alert(`Sada "${setName}" byla úspěšně vytvořena!`);

        setName(''); setText(''); setParsed(null); setErrors([]);
        if (fileRef.current) fileRef.current.value = '';
        onGoToSets();
      };

      return (
        <div style={s.container}>
          <h1 style={s.h1}>Vložit novou sadu</h1>
          <p style={s.subtitle}>Nahrajte .txt soubor nebo vložte text ve formátu <code>Strana A - Strana B</code></p>

          <div style={s.card}>
            <label style={s.label}>Název sady</label>
            <input type="text" value={name} onChange={(e) => setName(e.target.value)}
              placeholder="např. IT Governance – COBIT a ITIL" style={s.input} />

            <div style={{ marginTop: 20 }}>
              <label style={s.label}>Nahrát soubor</label>
              <div style={s.fileRow}>
                <button onClick={() => fileRef.current?.click()} style={s.fileBtn}>
                  <IconUpload />Vybrat .txt
                </button>
                <input ref={fileRef} type="file" accept=".txt,.csv,.md" onChange={handleFile} style={{ display: 'none' }} />
                <span style={s.fileHint}>nebo vložte text ručně níže</span>
              </div>
            </div>

            <div style={{ marginTop: 20 }}>
              <label style={s.label}>Text karet</label>
              <textarea value={text} onChange={(e) => updateParse(e.target.value)}
                placeholder={`# Komentář (přeskočí se)
Co znamená ACID? - Atomicity, Consistency, Isolation, Durability
Co je to denormalizace? - Záměrné porušení normálních forem pro výkon
...`}
                style={s.textarea} spellCheck={false} />
            </div>

            {parsed !== null && (
              <div style={s.parseStatus}>
                <div style={s.parseStatusRow}>
                  <IconCheck size={16} />
                  <span><strong>{parsed.length}</strong> karet nalezeno</span>
                </div>
                {errors.length > 0 && (
                  <div style={{ ...s.parseStatusRow, color: '#f59e0b', marginTop: 8 }}>
                    <IconAlert size={16} />
                    <span>{errors.length} řádků přeskočeno: {errors.slice(0, 2).join('; ')}{errors.length > 2 ? ` (+${errors.length - 2})` : ''}</span>
                  </div>
                )}
              </div>
            )}

            {parsed && parsed.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={s.previewTitle}>Náhled prvních karet</div>
                {parsed.slice(0, 3).map((c, i) => (
                  <div key={i} style={s.previewCard}>
                    <div style={{ color: '#fff' }}>{c.front}</div>
                    <div style={{ color: '#6b7280' }}>→</div>
                    <div style={{ color: '#9ca3af' }}>{c.back}</div>
                  </div>
                ))}
                {parsed.length > 3 && <div style={s.previewMore}>... + {parsed.length - 3} dalších</div>}
              </div>
            )}

            <button onClick={handleCreate} disabled={!parsed || parsed.length === 0}
              style={{ ...s.primaryBtn, opacity: (!parsed || parsed.length === 0) ? 0.4 : 1, cursor: (!parsed || parsed.length === 0) ? 'not-allowed' : 'pointer', marginTop: 24 }}>
              Vytvořit sadu
            </button>
          </div>

          {hasSets && (
            <div style={{ marginTop: 16, textAlign: 'center' }}>
              <button onClick={onGoToSets} style={s.linkBtn}>Zobrazit moje sady →</button>
            </div>
          )}
        </div>
      );
    }

    function MySetsTab({ sets, onStudy, onDelete, onReset, onCreate }) {
      if (sets.length === 0) {
        return (
          <div style={s.container}>
            <div style={s.emptyState}>
              <IconFile size={48} />
              <h2 style={{ ...s.h2, marginTop: 16 }}>Zatím žádné sady</h2>
              <p style={s.subtitle}>Vytvořte první sadu karet a začněte se učit.</p>
              <button onClick={onCreate} style={{ ...s.primaryBtn, marginTop: 16, width: 'auto', padding: '12px 24px' }}>Vytvořit sadu</button>
            </div>
          </div>
        );
      }

      return (
        <div style={s.container}>
          <h1 style={s.h1}>Moje sady</h1>
          <p style={s.subtitle}>{sets.length} {sets.length === 1 ? 'sada' : sets.length < 5 ? 'sady' : 'sad'} uloženo</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {sets.map((set) => {
              const stats = countStats(set.cards);
              return (
                <div key={set.id} style={s.setCard}>
                  <div style={s.setHeader}>
                    <div>
                      <h3 style={s.setName}>{set.name}</h3>
                      <div style={s.setMeta}>{set.cards.length} karet · {new Date(set.createdAt).toLocaleDateString('cs-CZ')}</div>
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button onClick={() => onStudy(set.id)} style={s.studyBtn}>
                        <IconPlay size={14} />Učit se
                      </button>
                      <button onClick={() => { if (confirm(`Smazat sadu "${set.name}"?`)) onDelete(set.id); }} style={s.iconBtn} title="Smazat">
                        <IconTrash size={14} />
                      </button>
                    </div>
                  </div>

                  <div style={s.statBar}>
                    <StatPill label="Věděl" count={stats.correct} color="#22c55e" />
                    <StatPill label="Částečně" count={stats.partial} color="#f59e0b" />
                    <StatPill label="Nevěděl" count={stats.wrong} color="#ef4444" />
                    <StatPill label="Neodp." count={stats.unanswered} color="#6b7280" />
                  </div>

                  <CardGrid cards={set.cards} compact />

                  {stats.correct + stats.partial + stats.wrong > 0 && (
                    <button onClick={() => { if (confirm('Resetovat všechny odpovědi v této sadě?')) onReset(set.id); }} style={s.resetLink}>
                      <IconReset size={12} />Resetovat postup
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function StatPill({ label, count, color }) {
      return (
        <div style={{ ...s.statPill, borderColor: color + '40' }}>
          <span style={{ ...s.statDot, background: color }} />
          <span style={{ color: '#9ca3af' }}>{label}</span>
          <span style={{ fontWeight: 600, color }}>{count}</span>
        </div>
      );
    }

    function CardGrid({ cards, activeIdx, onJump, compact = false }) {
      const colorFor = (status) => {
        if (status === 'correct') return '#22c55e';
        if (status === 'partial') return '#f59e0b';
        if (status === 'wrong') return '#ef4444';
        return '#374151';
      };
      const size = compact ? 9 : 12;
      const gap = compact ? 4 : 6;
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap, marginTop: compact ? 12 : 0 }}>
          {cards.map((c, i) => {
            const isActive = activeIdx === i;
            return (
              <button key={i} onClick={() => onJump && onJump(i)} disabled={!onJump}
                title={`Karta ${i + 1}: ${c.front.substring(0, 60)}${c.front.length > 60 ? '...' : ''}`}
                style={{
                  width: size, height: size, borderRadius: '50%',
                  background: colorFor(c.status),
                  border: isActive ? '2px solid #fff' : '2px solid transparent',
                  cursor: onJump ? 'pointer' : 'default', padding: 0,
                  boxShadow: isActive ? '0 0 0 2px #3b82f6' : 'none',
                }} />
            );
          })}
        </div>
      );
    }

    function StudyView({ set, isDaily, onExit, onStatusChange, onReset }) {
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [showPopup, setShowPopup] = useState(false);
      const [popupShown, setPopupShown] = useState(false);

      useEffect(() => { setFlipped(false); }, [idx]);

      const card = set.cards[idx];
      const stats = countStats(set.cards);
      const total = set.cards.length;
      const answered = stats.correct + stats.partial + stats.wrong;
      const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

      const next = useCallback(() => { setIdx((i) => Math.min(i + 1, total - 1)); }, [total]);
      const prev = useCallback(() => { setIdx((i) => Math.max(i - 1, 0)); }, []);

      const rate = useCallback((status) => {
        onStatusChange(idx, status);

        // Zkontroluj, zda je tohle poslední karta a zda jsme na všechno odpověděli
        if (idx < total - 1) {
          setTimeout(() => setIdx((i) => Math.min(i + 1, total - 1)), 150);
        } else {
          if (isDaily) {
            setTimeout(() => setShowPopup(true), 300);
          }
        }
      }, [idx, total, onStatusChange, isDaily]);

      useEffect(() => {
        if (isDaily && answered === total && total > 0 && !showPopup && !popupShown) {
          setShowPopup(true);
          setPopupShown(true);
        }
      }, [isDaily, answered, total, showPopup, popupShown]);

      useEffect(() => {
        const h = (e) => {
          if (e.key === ' ') { e.preventDefault(); setFlipped((f) => !f); }
          else if (e.key === 'ArrowRight') next();
          else if (e.key === 'ArrowLeft') prev();
          else if (e.key === 'Escape') onExit();
          else if (flipped && e.key === '1') rate('wrong');
          else if (flipped && e.key === '2') rate('partial');
          else if (flipped && e.key === '3') rate('correct');
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [flipped, next, prev, rate, onExit]);

      return (
        <div style={s.app}>
          {showPopup && (
            <div style={s.popupOverlay}>
              <div style={s.popupCard}>
                <h2 style={s.h2}>Denní test dokončen!</h2>
                <div style={s.popupStats}>
                  <div style={s.popupStatBox}>
                    <div style={{ fontSize: 32, fontWeight: 700, color: '#22c55e' }}>{Math.round((stats.correct / total) * 100) || 0}%</div>
                    <div style={{ color: '#9ca3af', fontSize: 13 }}>Úspěšnost (Věděl)</div>
                  </div>
                  <div style={s.popupStatBox}>
                    <div style={{ fontSize: 32, fontWeight: 700, color: '#3b82f6' }}>
                      {set.cards.filter(c => c.dailyOldStatus !== 'correct' && c.status === 'correct').length}
                    </div>
                    <div style={{ color: '#9ca3af', fontSize: 13 }}>Opravených karet</div>
                  </div>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 24, textAlign: 'left' }}>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#22c55e' }} /><span>Věděl</span><strong style={{ color: '#22c55e' }}>{stats.correct}</strong></div>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#f59e0b' }} /><span>Částečně</span><strong style={{ color: '#f59e0b' }}>{stats.partial}</strong></div>
                  <div style={s.statsRow}><span style={{ ...s.statDot, background: '#ef4444' }} /><span>Nevěděl</span><strong style={{ color: '#ef4444' }}>{stats.wrong}</strong></div>
                </div>

                <button onClick={onExit} style={s.primaryBtn}>Zpět na přehled denního testování</button>
                <button onClick={() => setShowPopup(false)} style={{ ...s.linkBtn, marginTop: 12 }}>Prohlédnout karty</button>
              </div>
            </div>
          )}
          <Header tab="mysets" onTabChange={() => onExit()} />
          <main style={s.main}>
            <div style={{ maxWidth: 1100, margin: '0 auto' }}>
              <div style={s.studyTopRow}>
                <button onClick={onExit} style={s.backBtn}>
                  <IconX size={16} />Ukončit
                </button>
                <div style={s.studyTitle}>{set.name}</div>
                <div style={{ color: '#9ca3af', fontSize: 13 }}>Karta {idx + 1} / {total}</div>
              </div>

              <div style={s.progressBar}>
                <div style={{ ...s.progressFill, width: `${pct}%` }} />
              </div>

              <div style={s.studyLayout}>
                <div style={{ display: 'flex', flexDirection: 'column' }}>
                  <div onClick={() => setFlipped((f) => !f)}
                    style={{ ...s.flashcard, background: flipped ? '#1e3a5f' : '#1f2937' }}>
                    <div style={s.cardSideLabel}>{flipped ? 'STRANA B' : 'STRANA A'}</div>
                    <div style={s.cardContent}>{flipped ? card.back : card.front}</div>
                    <div style={s.cardHint}>{flipped ? 'klikněte pro skrytí' : 'klikněte pro odhalení'}</div>
                  </div>

                  <div style={{ display: 'flex', alignItems: 'center', marginTop: 16, gap: 12 }}>
                    <button onClick={prev} disabled={idx === 0} style={{ ...s.navIconBtn, opacity: idx === 0 ? 0.3 : 1 }}>
                      <IconChevronLeft size={18} />Předchozí
                    </button>
                    <div style={{ flex: 1 }} />
                    <button onClick={next} disabled={idx === total - 1} style={{ ...s.navIconBtn, opacity: idx === total - 1 ? 0.3 : 1 }}>
                      Další<IconChevronRight size={18} />
                    </button>
                  </div>

                  {flipped && (
                    <div style={s.rateRow}>
                      <button onClick={() => rate('wrong')} style={{ ...s.rateBtn, background: '#7f1d1d', borderColor: '#ef4444' }}>
                        <span style={s.rateKey}>1</span>Nevěděl
                      </button>
                      <button onClick={() => rate('partial')} style={{ ...s.rateBtn, background: '#78350f', borderColor: '#f59e0b' }}>
                        <span style={s.rateKey}>2</span>Částečně
                      </button>
                      <button onClick={() => rate('correct')} style={{ ...s.rateBtn, background: '#14532d', borderColor: '#22c55e' }}>
                        <span style={s.rateKey}>3</span>Věděl
                      </button>
                    </div>
                  )}

                  {!flipped && (
                    <div style={{ textAlign: 'center', color: '#6b7280', fontSize: 12, marginTop: 16 }}>
                      Otočte kartu (klik nebo mezerník), poté ohodnoťte
                    </div>
                  )}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={s.statsBox}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 12 }}>
                      <span style={{ fontSize: 28, fontWeight: 700, color: '#fff' }}>{pct}%</span>
                      <span style={{ color: '#9ca3af', fontSize: 13 }}>postup</span>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <div style={s.statsRow}><span style={{ ...s.statDot, background: '#22c55e' }} /><span>Věděl</span><strong style={{ color: '#22c55e' }}>{stats.correct}</strong></div>
                      <div style={s.statsRow}><span style={{ ...s.statDot, background: '#f59e0b' }} /><span>Částečně</span><strong style={{ color: '#f59e0b' }}>{stats.partial}</strong></div>
                      <div style={s.statsRow}><span style={{ ...s.statDot, background: '#ef4444' }} /><span>Nevěděl</span><strong style={{ color: '#ef4444' }}>{stats.wrong}</strong></div>
                      <div style={s.statsRow}><span style={{ ...s.statDot, background: '#6b7280' }} /><span>Neodp.</span><strong style={{ color: '#9ca3af' }}>{stats.unanswered}</strong></div>
                    </div>
                  </div>

                  <div style={s.statsBox}>
                    <div style={{ fontSize: 12, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 12 }}>Mapa karet</div>
                    <CardGrid cards={set.cards} activeIdx={idx} onJump={setIdx} />
                  </div>

                  <button onClick={() => { if (confirm('Resetovat všechny odpovědi?')) onReset(); }} style={s.resetBtn}>
                    <IconReset size={14} />Resetovat
                  </button>
                </div>
              </div>

              <div style={{ marginTop: 24, textAlign: 'center', color: '#6b7280', fontSize: 12 }}>
                Zkratky: <kbd>Mezerník</kbd> otočit · <kbd>←</kbd> <kbd>→</kbd> navigace · <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> ohodnotit · <kbd>Esc</kbd> ukončit
              </div>
            </div>
          </main>
        </div>
      );
    }

    function GuideTab() {
      const example = `# Tohle je komentář (přeskočí se)
# Formát: Strana A - Strana B (jeden záznam na řádek)

Co znamená ACID? - Atomicity, Consistency, Isolation, Durability
Co je to OLTP? - Online Transaction Processing - systémy pro běžné transakce
Vyjmenuj 3 normální formy. - 1NF (atomické hodnoty), 2NF (závislost na celém PK), 3NF (žádná tranzitivní závislost)

# Můžete použít i jiné oddělovače:
Co je to DDL? | Data Definition Language (CREATE, ALTER, DROP)
Co je to DML? :: Data Manipulation Language (INSERT, UPDATE, DELETE, SELECT)`;

      const [copied, setCopied] = useState(false);
      const copyExample = () => {
        navigator.clipboard.writeText(example);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div style={s.container}>
          <h1 style={s.h1}>Návod</h1>
          <p style={s.subtitle}>Jak vytvořit a používat sady karet</p>

          <div style={s.card}>
            <h2 style={s.h2}>1. Formát souboru</h2>
            <p>Každá karta je na samostatném řádku ve formátu <code>Strana A - Strana B</code>. Mezi stranami musí být oddělovač s mezerami z obou stran. Podporované oddělovače:</p>
            <ul>
              <li><code> - </code> (mezera-pomlčka-mezera) — výchozí, vhodné pro většinu případů</li>
              <li><code> | </code> (mezera-svislítko-mezera) — použijte když odpověď obsahuje pomlčku</li>
              <li><code> :: </code> (mezera-dvojtečky-mezera) — když odpověď obsahuje i pomlčku i svislítko</li>
            </ul>
            <p>Pravidla:</p>
            <ul>
              <li>Prázdné řádky se ignorují</li>
              <li>Řádky začínající <code>#</code> jsou komentáře a přeskočí se</li>
              <li>Otázku ani odpověď <strong>nezalamujte</strong> na více řádků</li>
              <li>Pokud řádek nemá oddělovač, přeskočí se</li>
            </ul>
          </div>

          <div style={s.card}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h2 style={{ ...s.h2, margin: 0 }}>2. Příklad</h2>
              <button onClick={copyExample} style={s.smallBtn}>{copied ? 'Zkopírováno!' : 'Kopírovat'}</button>
            </div>
            <pre style={s.codeBlock}>{example}</pre>
          </div>

          <div style={s.card}>
            <h2 style={s.h2}>3. Učení</h2>
            <p>V sadě klikněte na <strong>Učit se</strong>. Při každé kartě:</p>
            <ol>
              <li>Přečtěte přední stranu a v hlavě si zformulujte odpověď</li>
              <li>Klikněte na kartu (nebo zmáčkněte <kbd>Mezerník</kbd>) — otočí se</li>
              <li>Porovnejte vlastní odpověď a ohodnoťte se:
                <ul>
                  <li><span style={{ color: '#ef4444' }}><strong>Nevěděl</strong></span> (<kbd>1</kbd>) — nezvládl jsem, vrátit se k tomu</li>
                  <li><span style={{ color: '#f59e0b' }}><strong>Částečně</strong></span> (<kbd>2</kbd>) — věděl jsem půlku, nebo s váháním</li>
                  <li><span style={{ color: '#22c55e' }}><strong>Věděl</strong></span> (<kbd>3</kbd>) — odpověděl jsem správně a jistě</li>
                </ul>
              </li>
            </ol>
            <p>Po ohodnocení appka automaticky přejde na další kartu.</p>
          </div>

          <div style={s.card}>
            <h2 style={s.h2}>4. Tip k používání</h2>
            <p>Hodnoťte se přísně. Když si nejste jistí 100%, je to <strong>Částečně</strong>, ne <strong>Věděl</strong>. U státnic ABCD nestačí — komise chce slyšet, že to víte jistě a umíte to formulovat.</p>
            <p>Po projetí celé sady si vyfiltrujte všechno, co není zelené, a projděte to znovu — od <strong>Nevěděl</strong> nahoru.</p>
          </div>

          <div style={s.card}>
            <h2 style={s.h2}>5. Denní testování</h2>
            <p>Pro pravidelné opakování slouží záložka <strong>Denní testování</strong>.</p>
            <ul>
              <li>V záložce <strong>Nastavení</strong> si vyberte sady, které chcete denně procvičovat.</li>
              <li>Zvolte si, kolik karet chcete denně z dané sady opakovat a jaký filtr použít (např. pouze karty, které jste minule nevěděli).</li>
              <li>Každý den se automaticky vygeneruje nová dávka karet ke zkoušení.</li>
              <li>Vaše hodnocení z denního testování se ihned propisuje zpět do hlavní sady, takže si průběžně vylepšujete celkové statistiky a odstraňujete mezery ve znalostech.</li>
            </ul>
          </div>

          <div style={s.card}>
            <h2 style={s.h2}>6. Ukládání dat</h2>
            <p>Všechny sady se ukládají do <strong>localStorage</strong> v prohlížeči. To znamená:</p>
            <ul>
              <li>Data zůstanou i po zavření prohlížeče</li>
              <li>Data se neztratí při restartu počítače</li>
              <li>Data jsou <strong>vázána na konkrétní soubor a prohlížeč</strong> — když přesunete HTML jinam nebo otevřete v jiném prohlížeči, sady tam nebudou</li>
              <li>Pokud chcete sady přenést, můžete v dev tools (F12 → Application → Local Storage) zkopírovat hodnotu klíče <code>flashcard_sets_v2</code></li>
            </ul>
          </div>
        </div>
      );
    }

    function SettingsTab({ sets, settings, setSettings }) {
      const [selectedSet, setSelectedSet] = useState('');
      const [cardCount, setCardCount] = useState(10);
      const [mode, setMode] = useState('all');

      const handleAddConfig = () => {
        if (!selectedSet) return;
        const existing = settings.dailyTestConfigs.find(c => c.setId === selectedSet);
        if (existing) {
          alert('Tato sada už je v denním testování nastavená.');
          return;
        }
        const maxCards = sets.find(s => s.id === selectedSet)?.cards.length || 10;
        const finalCount = Math.min(Math.max(1, parseInt(cardCount, 10)), maxCards);

        setSettings(prev => ({
          ...prev,
          dailyTestConfigs: [...prev.dailyTestConfigs, { setId: selectedSet, count: finalCount, mode }]
        }));
        setSelectedSet('');
      };

      const handleRemoveConfig = (setId) => {
        setSettings(prev => ({
          ...prev,
          dailyTestConfigs: prev.dailyTestConfigs.filter(c => c.setId !== setId)
        }));
      };

      return (
        <div style={s.container}>
          <h1 style={s.h1}>Nastavení</h1>
          <p style={s.subtitle}>Konfigurace aplikace a denního testování</p>

          <div style={s.card}>
            <h2 style={s.h2}>Přidat do Denního testování</h2>
            <p style={{ color: '#9ca3af', marginBottom: 16, fontSize: 13 }}>
              Vyberte sady, které se mají každý den automaticky vygenerovat k procvičení. Nastavení se projeví až další den (nepřegenerovává dnešní sady).
            </p>

            {sets.length === 0 ? (
              <div style={{ color: '#ef4444' }}>Nejprve si musíte vytvořit nějakou sadu.</div>
            ) : (
              <div style={{ display: 'grid', gap: 16 }}>
                <div>
                  <label style={s.label}>Sada</label>
                  <select value={selectedSet} onChange={(e) => setSelectedSet(e.target.value)} style={s.input}>
                    <option value="">-- Vyberte sadu --</option>
                    {sets.map(s => <option key={s.id} value={s.id}>{s.name} ({s.cards.length} karet)</option>)}
                  </select>
                </div>
                <div className="resp-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <div>
                    <label style={s.label}>Počet karet (max {selectedSet ? sets.find(s => s.id === selectedSet)?.cards.length : '?'})</label>
                    <input type="number" min="1" max={selectedSet ? sets.find(s => s.id === selectedSet)?.cards.length : 100} value={cardCount} onChange={(e) => setCardCount(e.target.value)} style={s.input} />
                  </div>
                  <div>
                    <label style={s.label}>Výběr karet</label>
                    <select value={mode} onChange={(e) => setMode(e.target.value)} style={s.input}>
                      <option value="all">Všechny</option>
                      <option value="partial_wrong">Částečně a Nevěděl</option>
                      <option value="only_wrong">Pouze Nevěděl</option>
                    </select>
                  </div>
                </div>
                <button onClick={handleAddConfig} disabled={!selectedSet} style={{ ...s.primaryBtn, opacity: selectedSet ? 1 : 0.5 }}>Přidat sadu k testování</button>
              </div>
            )}
          </div>

          <h2 style={{ ...s.h2, marginTop: 32 }}>Aktivní denní testování</h2>
          {settings.dailyTestConfigs.length === 0 ? (
            <div style={{ color: '#9ca3af' }}>Zatím nemáte nastavené žádné sady pro denní testování.</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {settings.dailyTestConfigs.map(c => {
                const setName = sets.find(s => s.id === c.setId)?.name || 'Neznámá sada';
                const modeText = c.mode === 'all' ? 'Všechny' : c.mode === 'partial_wrong' ? 'Částečně a Nevěděl' : 'Pouze Nevěděl';
                return (
                  <div key={c.setId} style={{ ...s.setCard, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <h3 style={s.setName}>{setName}</h3>
                      <div style={s.setMeta}>{c.count} karet · {modeText}</div>
                    </div>
                    <button onClick={() => handleRemoveConfig(c.setId)} style={s.iconBtn} title="Odebrat">
                      <IconTrash size={14} />
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function ReviewPopup({ set, onClose }) {
      if (!set) return null;
      return (
        <div style={s.popupOverlay} onClick={onClose}>
          <div style={{ ...s.popupCard, maxWidth: 600, maxHeight: '80vh', overflowY: 'auto', padding: 24, textAlign: 'left' }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <h2 style={{ ...s.h2, margin: 0 }}>Přehled karet: {set.name}</h2>
              <button onClick={onClose} style={s.iconBtn}><IconX size={16} /></button>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {set.cards.map((c, i) => {
                let color = '#6b7280';
                let label = 'Neodpovězeno';
                if (c.status === 'correct') { color = '#22c55e'; label = 'Věděl'; }
                if (c.status === 'partial') { color = '#f59e0b'; label = 'Částečně'; }
                if (c.status === 'wrong') { color = '#ef4444'; label = 'Nevěděl'; }

                return (
                  <div key={i} style={{ background: '#0a0a0a', border: `1px solid ${color}40`, borderRadius: 8, padding: 12 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                      <div style={{ fontSize: 12, color: '#9ca3af' }}>Karta {i + 1}</div>
                      <div style={{ fontSize: 11, fontWeight: 600, color, background: `${color}20`, padding: '2px 8px', borderRadius: 4 }}>{label}</div>
                    </div>
                    <div style={{ color: '#fff', marginBottom: 6, fontSize: 14 }}><strong>A:</strong> {c.front}</div>
                    <div style={{ color: '#9ca3af', fontSize: 14 }}><strong>B:</strong> {c.back}</div>
                  </div>
                )
              })}
            </div>
          </div>
        </div>
      );
    }

    function DailyTestTab({ dailyData, onStudyDaily, onGoToSettings }) {
      const [reviewSetId, setReviewSetId] = useState(null);

      if (!dailyData.sets || dailyData.sets.length === 0) {
        return (
          <div style={s.container}>
            <div style={s.emptyState}>
              <IconPlay size={48} />
              <h2 style={{ ...s.h2, marginTop: 16 }}>Dnešní testování prázdné</h2>
              <p style={s.subtitle}>Nemáte nastavené sady pro denní testování, nebo se nevybraly žádné karty pro procvičení.</p>
              <button onClick={onGoToSettings} style={{ ...s.primaryBtn, marginTop: 16, width: 'auto', padding: '12px 24px' }}>Přejít do nastavení</button>
            </div>
          </div>
        );
      }

      // Funkce pro získání barvy podle úspěšnosti (semafor 0 - 100%)
      const getColorForSuccess = (pct) => {
        // 0% = red (0), 50% = yellow (60), 100% = green (120) - HSL
        const hue = (pct * 120) / 100;
        return `hsl(${hue}, 80%, 40%)`; // tmavší pastelová verze pro pozadí
      };

      return (
        <div style={s.container}>
          {reviewSetId && (
            <ReviewPopup
              set={dailyData.sets.find(s => s.id === reviewSetId)}
              onClose={() => setReviewSetId(null)}
            />
          )}
          <h1 style={s.h1}>Denní testování - {new Date(dailyData.date).toLocaleDateString('cs-CZ')}</h1>
          <p style={s.subtitle}>Vygenerováno {dailyData.sets.length} sad na dnešní den k prozkoušení.</p>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
            {dailyData.sets.map((set) => {
              const stats = countStats(set.cards);
              const total = set.cards.length;
              const answered = stats.correct + stats.partial + stats.wrong;
              // úspěšnost jen ze zodpovězených karet
              const successPct = answered > 0 ? Math.round((stats.correct / answered) * 100) : 0;
              const completedPct = total > 0 ? Math.round((answered / total) * 100) : 0;

              const boxBg = completedPct > 0 ? getColorForSuccess(successPct) : '#1f2937';
              const modeText = set.mode === 'all' ? 'Všechny' : set.mode === 'partial_wrong' ? 'Částečně/Nevěděl' : 'Jen Nevěděl';

              return (
                <div key={set.id} style={{ ...s.setCard, display: 'flex', flexDirection: 'column', background: boxBg, position: 'relative', overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', top: 0, left: 0, height: 4, width: `${completedPct}%`, background: 'rgba(255,255,255,0.4)' }} />

                  <h3 style={{ ...s.setName, fontSize: 18, marginBottom: 8, color: '#fff' }}>{set.name}</h3>
                  <div style={{ ...s.setMeta, color: 'rgba(255,255,255,0.8)', marginBottom: 16 }}>
                    {total} karet · Filtr: {modeText}
                  </div>

                  <div style={{ display: 'flex', gap: 12, marginBottom: 16, flex: 1 }}>
                    <div style={{ flex: 1, background: 'rgba(0,0,0,0.2)', padding: '8px 12px', borderRadius: 8 }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: '#fff' }}>{successPct}%</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase' }}>Úspěšnost</div>
                    </div>
                    <div style={{ flex: 1, background: 'rgba(0,0,0,0.2)', padding: '8px 12px', borderRadius: 8 }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: '#fff' }}>{completedPct}%</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase' }}>Dokončeno</div>
                    </div>
                  </div>

                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => onStudyDaily(set.id)} disabled={completedPct === 100} style={{ ...s.primaryBtn, flex: 1, background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(255,255,255,0.2)', opacity: completedPct === 100 ? 0.5 : 1, cursor: completedPct === 100 ? 'not-allowed' : 'pointer', padding: '10px 0' }}>
                      {completedPct === 100 ? 'Hotovo' : 'Spustit'}
                    </button>
                    {completedPct === 100 && (
                      <button onClick={() => setReviewSetId(set.id)} style={{ ...s.primaryBtn, flex: 1, background: 'rgba(0, 0, 0, 0.25)', border: '1px solid rgba(255, 255, 255, 0.3)', color: '#fff', padding: '10px 0' }}>
                        Prohlédnout
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ExportImportTab({ sets, settings, dailyData, onImportAll }) {
      const [importError, setImportError] = useState(null);
      const [importPreview, setImportPreview] = useState(null);
      const fileRef = useRef(null);

      const handleExport = () => {
        const csv = exportToCSV(sets, settings, dailyData);
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `flashcards_export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          let text = String(ev.target?.result || '');
          if (text.startsWith('﻿')) text = text.slice(1);
          try {
            const preview = importFromCSV(text);
            setImportPreview(preview);
            setImportError(null);
          } catch (err) {
            setImportError(err.message);
            setImportPreview(null);
          }
        };
        reader.readAsText(file, 'UTF-8');
      };

      const handleConfirmImport = () => {
        if (!importPreview) return;
        const totalCards = importPreview.sets.reduce((acc, set) => acc + set.cards.length, 0);
        if (!confirm(`Tato akce NAHRADÍ všechna stávající data:\n• ${sets.length} sad → ${importPreview.sets.length} sad\n• ${sets.reduce((a,s)=>a+s.cards.length,0)} karet → ${totalCards} karet\n\nPokračovat?`)) return;
        onImportAll(importPreview.sets, importPreview.settings, importPreview.dailyData);
        setImportPreview(null);
        setImportError(null);
        if (fileRef.current) fileRef.current.value = '';
        alert('Import proběhl úspěšně!');
      };

      const handleCancelImport = () => {
        setImportPreview(null);
        setImportError(null);
        if (fileRef.current) fileRef.current.value = '';
      };

      const totalCards = sets.reduce((acc, set) => acc + set.cards.length, 0);

      return (
        <div style={s.container}>
          <h1 style={s.h1}>Export a Import</h1>
          <p style={s.subtitle}>Přeneste svá data mezi zařízeními nebo si uložte zálohu.</p>

          <div style={s.card}>
            <h2 style={s.h2}>Export</h2>
            <p style={{ color: '#9ca3af', fontSize: 13, marginBottom: 16 }}>
              Stáhne CSV soubor se všemi sadami, denními konfiguracemi a dnešním testováním.
              Soubor lze znovu importovat na libovolném zařízení.
            </p>
            <div className="resp-grid-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20 }}>
              <div style={{ background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '12px 16px', textAlign: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: '#3b82f6' }}>{sets.length}</div>
                <div style={{ fontSize: 12, color: '#6b7280' }}>Sad</div>
              </div>
              <div style={{ background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '12px 16px', textAlign: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: '#3b82f6' }}>{totalCards}</div>
                <div style={{ fontSize: 12, color: '#6b7280' }}>Karet celkem</div>
              </div>
              <div style={{ background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '12px 16px', textAlign: 'center' }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: '#3b82f6' }}>{settings.dailyTestConfigs.length}</div>
                <div style={{ fontSize: 12, color: '#6b7280' }}>Denních konfigurací</div>
              </div>
            </div>
            <button
              onClick={handleExport}
              disabled={sets.length === 0}
              style={{ ...s.primaryBtn, opacity: sets.length === 0 ? 0.4 : 1, cursor: sets.length === 0 ? 'not-allowed' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
              <IconDownload size={16} />Stáhnout CSV export
            </button>
          </div>

          <div style={s.card}>
            <h2 style={s.h2}>Import</h2>
            <p style={{ color: '#9ca3af', fontSize: 13, marginBottom: 4 }}>
              Načte CSV soubor z exportu a obnoví všechna data.
            </p>
            <p style={{ color: '#f59e0b', fontSize: 13, marginBottom: 16 }}>
              Pozor: import <strong>nahradí</strong> všechna stávající data v tomto prohlížeči.
            </p>

            {!importPreview && (
              <>
                <button onClick={() => fileRef.current?.click()} style={s.fileBtn}>
                  <IconUpload />Vybrat CSV soubor
                </button>
                <input ref={fileRef} type="file" accept=".csv" onChange={handleImportFile} style={{ display: 'none' }} />
              </>
            )}

            {importError && (
              <div style={{ marginTop: 16, padding: 12, background: '#450a0a', border: '1px solid #ef4444', borderRadius: 8, color: '#ef4444', fontSize: 13 }}>
                Chyba: {importError}
              </div>
            )}

            {importPreview && (
              <div style={{ marginTop: 4 }}>
                <div style={{ padding: 16, background: '#0a2a0a', border: '1px solid #22c55e40', borderRadius: 8, marginBottom: 16 }}>
                  <div style={{ fontSize: 13, color: '#22c55e', fontWeight: 600, marginBottom: 12 }}>Náhled importu:</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 12 }}>
                    <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                      <div style={{ fontSize: 20, fontWeight: 700, color: '#fff' }}>{importPreview.sets.length}</div>
                      <div style={{ fontSize: 12, color: '#9ca3af' }}>Sad</div>
                    </div>
                    <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                      <div style={{ fontSize: 20, fontWeight: 700, color: '#fff' }}>{importPreview.sets.reduce((acc, set) => acc + set.cards.length, 0)}</div>
                      <div style={{ fontSize: 12, color: '#9ca3af' }}>Karet</div>
                    </div>
                    <div style={{ background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                      <div style={{ fontSize: 20, fontWeight: 700, color: '#fff' }}>{importPreview.settings.dailyTestConfigs.length}</div>
                      <div style={{ fontSize: 12, color: '#9ca3af' }}>Konfigurací</div>
                    </div>
                  </div>
                  {importPreview.sets.length > 0 && (
                    <div>
                      <div style={{ fontSize: 11, color: '#9ca3af', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Sady v souboru:</div>
                      {importPreview.sets.slice(0, 5).map((set, i) => (
                        <div key={i} style={{ fontSize: 13, color: '#d1d5db', padding: '2px 0' }}>• {set.name} ({set.cards.length} karet)</div>
                      ))}
                      {importPreview.sets.length > 5 && <div style={{ fontSize: 12, color: '#6b7280', marginTop: 4 }}>... +{importPreview.sets.length - 5} dalších</div>}
                    </div>
                  )}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                  <button onClick={handleCancelImport} style={{ ...s.primaryBtn, background: '#1f2937', color: '#9ca3af' }}>Zrušit</button>
                  <button onClick={handleConfirmImport} style={{ ...s.primaryBtn, background: '#16a34a' }}>Importovat</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- Styles ---
    const s = {
      app: { minHeight: '100vh' },
      header: { borderBottom: '1px solid #1f2937', background: '#0a0a0a', position: 'sticky', top: 0, zIndex: 10 },
      headerInner: { maxWidth: 1200, margin: '0 auto', padding: '16px 24px', display: 'flex', alignItems: 'center', gap: 32 },
      logo: { fontSize: 18, fontWeight: 700, color: '#fff' },
      nav: { display: 'flex', gap: 24 },
      navBtn: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, padding: '4px 0' },
      main: { maxWidth: 1200, margin: '0 auto', padding: '32px 24px' },
      container: { maxWidth: 900, margin: '0 auto' },
      h1: { fontSize: 28, fontWeight: 700, color: '#fff', margin: '0 0 8px' },
      h2: { fontSize: 18, fontWeight: 600, color: '#fff', margin: '0 0 12px' },
      subtitle: { color: '#9ca3af', margin: '0 0 24px' },
      card: { background: '#111827', border: '1px solid #1f2937', borderRadius: 12, padding: 24, marginBottom: 16 },
      label: { display: 'block', fontSize: 13, fontWeight: 500, color: '#9ca3af', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.05em' },
      input: { width: '100%', background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '10px 14px', color: '#fff', fontSize: 14, outline: 'none' },
      textarea: { width: '100%', minHeight: 200, background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: '12px 14px', color: '#fff', fontSize: 13, fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace', outline: 'none', resize: 'vertical' },
      fileRow: { display: 'flex', alignItems: 'center', gap: 12 },
      fileBtn: { display: 'inline-flex', alignItems: 'center', gap: 8, background: '#1f2937', border: '1px solid #374151', borderRadius: 8, padding: '8px 14px', color: '#fff', cursor: 'pointer', fontSize: 13 },
      fileHint: { color: '#6b7280', fontSize: 13 },
      primaryBtn: { background: '#2563eb', color: '#fff', border: 'none', borderRadius: 8, padding: '12px 20px', fontSize: 14, fontWeight: 600, cursor: 'pointer', width: '100%' },
      linkBtn: { background: 'none', border: 'none', color: '#60a5fa', cursor: 'pointer', fontSize: 14 },
      smallBtn: { background: '#1f2937', border: '1px solid #374151', borderRadius: 6, padding: '6px 10px', color: '#fff', cursor: 'pointer', fontSize: 12 },
      parseStatus: { marginTop: 16, padding: 12, background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8 },
      parseStatusRow: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#22c55e' },
      previewTitle: { fontSize: 12, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 },
      previewCard: { display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 12, alignItems: 'center', padding: '10px 14px', background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, marginBottom: 6, fontSize: 13 },
      previewMore: { textAlign: 'center', color: '#6b7280', fontSize: 12, padding: 8 },
      codeBlock: { background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 8, padding: 16, fontSize: 13, fontFamily: 'ui-monospace, monospace', overflow: 'auto', margin: '12px 0 0', whiteSpace: 'pre-wrap' },
      emptyState: { textAlign: 'center', padding: '64px 24px', background: '#111827', border: '1px solid #1f2937', borderRadius: 12, color: '#9ca3af' },
      setCard: { background: '#111827', border: '1px solid #1f2937', borderRadius: 12, padding: 20 },
      setHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 },
      setName: { fontSize: 16, fontWeight: 600, color: '#fff', margin: '0 0 4px' },
      setMeta: { fontSize: 12, color: '#6b7280' },
      studyBtn: { display: 'inline-flex', alignItems: 'center', gap: 6, background: '#2563eb', color: '#fff', border: 'none', borderRadius: 8, padding: '8px 14px', cursor: 'pointer', fontSize: 13, fontWeight: 500 },
      iconBtn: { background: '#1f2937', border: '1px solid #374151', borderRadius: 8, padding: 8, color: '#9ca3af', cursor: 'pointer', display: 'flex', alignItems: 'center' },
      statBar: { display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 4 },
      statPill: { display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 10px', borderRadius: 999, border: '1px solid', background: '#0a0a0a', fontSize: 12 },
      statDot: { width: 8, height: 8, borderRadius: '50%', display: 'inline-block' },
      resetLink: { display: 'inline-flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', color: '#6b7280', cursor: 'pointer', fontSize: 12, padding: '8px 0 0', marginTop: 8 },
      studyTopRow: { display: 'flex', alignItems: 'center', gap: 16, marginBottom: 16 },
      backBtn: { display: 'inline-flex', alignItems: 'center', gap: 6, background: '#1f2937', border: '1px solid #374151', borderRadius: 8, padding: '6px 12px', color: '#9ca3af', cursor: 'pointer', fontSize: 13 },
      studyTitle: { flex: 1, fontSize: 18, fontWeight: 600, color: '#fff' },
      progressBar: { height: 4, background: '#1f2937', borderRadius: 999, overflow: 'hidden', marginBottom: 24 },
      progressFill: { height: '100%', background: '#2563eb', transition: 'width 0.2s' },
      studyLayout: { display: 'grid', gridTemplateColumns: '1fr 320px', gap: 24 },
      flashcard: { border: '1px solid #374151', borderRadius: 16, padding: '48px 32px', minHeight: 280, cursor: 'pointer', userSelect: 'none', display: 'flex', flexDirection: 'column', justifyContent: 'center', transition: 'background 0.2s', position: 'relative' },
      cardSideLabel: { position: 'absolute', top: 16, left: 24, fontSize: 11, fontWeight: 600, color: '#6b7280', letterSpacing: '0.1em' },
      cardContent: { fontSize: 22, color: '#fff', textAlign: 'center', lineHeight: 1.4 },
      cardHint: { position: 'absolute', bottom: 16, left: 0, right: 0, textAlign: 'center', fontSize: 11, color: '#6b7280' },
      navIconBtn: { display: 'inline-flex', alignItems: 'center', gap: 6, background: '#1f2937', border: '1px solid #374151', borderRadius: 8, padding: '8px 14px', color: '#fff', cursor: 'pointer', fontSize: 13 },
      rateRow: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 16 },
      rateBtn: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, border: '1px solid', borderRadius: 8, padding: '14px 16px', color: '#fff', cursor: 'pointer', fontSize: 14, fontWeight: 600 },
      rateKey: { fontSize: 11, background: 'rgba(255,255,255,0.15)', padding: '2px 6px', borderRadius: 4, fontWeight: 600 },
      statsBox: { background: '#111827', border: '1px solid #1f2937', borderRadius: 12, padding: 16 },
      statsRow: { display: 'grid', gridTemplateColumns: '16px 1fr auto', alignItems: 'center', gap: 8, fontSize: 13, color: '#d1d5db' },
      resetBtn: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, background: '#1f2937', border: '1px solid #374151', borderRadius: 8, padding: '8px 14px', color: '#9ca3af', cursor: 'pointer', fontSize: 13 },
      popupOverlay: { position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.8)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 },
      popupCard: { background: '#111827', border: '1px solid #1f2937', borderRadius: 16, padding: 32, width: '100%', maxWidth: 400, textAlign: 'center', boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.5)' },
      popupStats: { display: 'flex', gap: 16, justifyContent: 'center', marginBottom: 24, marginTop: 16 },
      popupStatBox: { flex: 1, background: '#0a0a0a', border: '1px solid #1f2937', borderRadius: 12, padding: 16 },
    };

    // Mobile responsive
    if (window.innerWidth < 768) {
      s.studyLayout = { display: 'flex', flexDirection: 'column', gap: 16 };
      s.main = { ...s.main, padding: '16px' };
      s.headerInner = { ...s.headerInner, padding: '10px 16px', gap: 12 };
      s.h1 = { ...s.h1, fontSize: 22 };
      s.card = { ...s.card, padding: 16 };
      s.setCard = { ...s.setCard, padding: 14 };
      s.flashcard = { ...s.flashcard, padding: '32px 18px', minHeight: 200 };
      s.cardContent = { ...s.cardContent, fontSize: 18 };
      s.studyTitle = { ...s.studyTitle, fontSize: 15, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '45vw' };
      s.rateBtn = { ...s.rateBtn, padding: '14px 6px', fontSize: 12 };
      s.popupCard = { ...s.popupCard, padding: 20 };
    }

    if (window.innerWidth >= 768 && window.innerWidth < 1024) {
      s.studyLayout = { display: 'grid', gridTemplateColumns: '1fr 280px', gap: 20 };
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FlashcardsApp />);
  </script>
</body>
